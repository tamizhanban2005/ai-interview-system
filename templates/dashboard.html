<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    background: #f4f6f9;
}

/* Sidebar animation */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #2c3e50;
    color: white;
    padding: 20px;
    position: fixed;

    animation: slideIn 0.8s ease-in-out;
}

@keyframes slideIn {
    from {
        transform: translateX(-100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    text-decoration: none;
    margin: 5px 0;
    border-radius: 5px;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #34495e;
    transform: scale(1.05);
}

/* Main animation */
.main {
    margin-left: 240px;
    padding: 30px;
    width: 100%;

    animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Cards animation */
.cards {
    display: flex;
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    width: 200px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    text-align: center;

    transition: 0.3s;
    animation: popUp 0.8s ease-in-out;
}

@keyframes popUp {
    from {
        transform: scale(0.8);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* Buttons animation */
.btn {
    margin-top: 20px;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: #3498db;
    color: white;
    text-decoration: none;
    display: inline-block;

    transition: 0.3s;
}

.btn:hover {
    background: #2980b9;
    transform: scale(1.1);
}

.logout {
    background: #e74c3c;
}

.logout:hover {
    background: #c0392b;
}
</style>
